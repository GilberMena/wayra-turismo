  <div class="container">
    <h1>Panel administrador</h1>
    <div class="admin-card" id="adminArea" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <button id="btnExport" class="btn-primary">Exportar CSV</button>
          <button id="btnClearHandled" class="btn-secondary">Eliminar resueltas</button>
        </div>
        <div class="small">Reservas locales: <span id="resCount">0</span></div>
      </div>
      <div style="margin-top:12px;overflow:auto">
        <table id="resTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Fecha</th>
              <th>Plan</th>
              <th>Nombre</th>
              <th>Tel</th>
              <th>Email</th>
              <th>Fechas</th>
              <th>Personas</th>
              <th>Comentarios</th>
              <th>Estado</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Botón flotante WhatsApp -->
  <a href="https://wa.me/573225225582?text=Hola%2C%20necesito%20soporte%20con%20el%20Panel%20de%20Administraci%C3%B3n"
    class="wa-float" target="_blank" rel="noopener" aria-label="Soporte WhatsApp" data-wa-link>
    <svg width="30" height="30" viewBox="0 0 24 24" fill="white" aria-hidden="true">
      <path
        d="M20.5 3.5A12 12 0 0 0 3.5 20.5L2 22l1.6-1.6A12 12 0 1 0 20.5 3.5zM12 21a9 9 0 0 1-4.6-1.3l-.3-.2-3.3.9.9-3.2-.2-.3A9 9 0 1 1 12 21zm5-6.6c-.3-.1-1.6-.8-1.9-.9-.3-.1-.5-.1-.7.1-.2.3-.8.9-1 1.1-.2.2-.3.2-.6.1A8 8 0 0 1 9.5 13a7.2 7.2 0 0 1-1.7-2c-.2-.3 0-.5.1-.6l.5-.5.3-.5v-.5L7.4 8c-.2-.4-.4-.4-.6-.4h-.5c-.2 0-.5 0-.7.3-.3.3-1 1-1 2.4s1 2.8 1.2 3c.1.1 2 3.1 4.9 4.3.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.6-.1 1.8-.7 2-1.4.3-.7.3-1.2.2-1.4l-.3-.2z" />
    </svg>
    <span class="wa-float-text">¿Soporte?</span>
  </a>

  <script>
    // Simple client-side admin check
    (function checkAuth() {
      const cookies = document.cookie.split('; ');
      const token = cookies.find(row => row.startsWith('wayra_admin_token='));
      if (!token) {
        window.location.href = "admin-login.html?next=" + encodeURIComponent(window.location.pathname);
      }
    })();
    (function () {
      const adminArea = document.getElementById('adminArea');
      adminArea.style.display = 'block';

      async function loadRes() {
        const tbody = document.querySelector('#resTable tbody');
        tbody.innerHTML = '';
        // Try serverless list first
        try {
          const resp = await fetch('/api/list-reservations');
          if (resp.ok) {
            const json = await resp.json();
            if (json && json.records) {
              json.records.forEach(function (rec, i) {
                const f = rec.fields || {};
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${i + 1}</td><td>${new Date(f['created_at'] || rec.createdTime || '').toLocaleString()}</td><td>${f['Plan'] || ''}</td><td>${f['Nombre'] || ''}</td><td>${f['Telefono'] || ''}</td><td>${f['Email'] || ''}</td><td>${f['Fecha Inicio'] || ''} - ${f['Fecha Fin'] || ''}</td><td>${f['Personas'] || ''}</td><td>${(f['Comentarios'] || '').replace(/\n/g, '<br>')}</td><td class="small">Servidor</td><td></td>`;
                tbody.appendChild(tr);
              });
              document.getElementById('resCount').textContent = json.records.length;
              return;
            }
          }
        } catch (e) { /* ignore and fallback to localStorage */ }

        // Fallback: localStorage
        const key = 'vivewayra_reservas';
        const arr = JSON.parse(localStorage.getItem(key) || '[]');
        arr.forEach(function (r, i) {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${i + 1}</td><td>${new Date(r.created_at || '').toLocaleString()}</td><td>${r.plan || ''}</td><td>${r.name || ''}</td><td>${r.phone || ''}</td><td>${r.email || ''}</td><td>${r.start || ''} - ${r.end || ''}</td><td>${r.guests || ''}</td><td>${(r.comments || '').replace(/\n/g, '<br>')}</td><td class="small">${r.handled ? '<span class="status-handled">Resuelta</span>' : 'Pendiente'}</td><td><button class="btn-secondary" data-idx="${i}">${r.handled ? 'Reabrir' : 'Marcar resuelta'}</button></td>`;
          tbody.appendChild(tr);
        });
        document.getElementById('resCount').textContent = arr.length;
        document.querySelectorAll('#resTable button').forEach(function (b) {
          b.addEventListener('click', function () {
            const idx = parseInt(this.dataset.idx, 10);
            toggleHandled(idx);
          });
        });
      }

      function toggleHandled(idx) {
        const key = 'vivewayra_reservas';
        const arr = JSON.parse(localStorage.getItem(key) || '[]');
        if (!arr[idx]) return;
        arr[idx].handled = !arr[idx].handled;
        localStorage.setItem(key, JSON.stringify(arr));
        loadRes();
      }

      function exportCSV() {
        const key = 'vivewayra_reservas';
        const arr = JSON.parse(localStorage.getItem(key) || '[]');
        if (!arr.length) { alert('No hay reservas para exportar.'); return; }
        const rows = [['created_at', 'plan', 'name', 'phone', 'email', 'start', 'end', 'guests', 'comments', 'handled']];
        arr.forEach(r => rows.push([r.created_at || '', r.plan || '', r.name || '', r.phone || '', r.email || '', r.start || '', r.end || '', r.guests || '', (r.comments || '').replace(/\n/g, ' '), r.handled ? 1 : 0]));
        const csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'reservas_vivewayra.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      }

      function clearHandled() {
        const key = 'vivewayra_reservas';
        const arr = JSON.parse(localStorage.getItem(key) || '[]');
        const filtered = arr.filter(r => !r.handled);
        localStorage.setItem(key, JSON.stringify(filtered));
        loadRes();
      }

      document.getElementById('btnExport').addEventListener('click', exportCSV);
      document.getElementById('btnClearHandled').addEventListener('click', function () { if (confirm('Eliminar las reservas marcadas como resuelta?')) clearHandled(); });

      loadRes();
    })();
  </script>
</body>

</html>
