<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <defs>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D463D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5E7D63;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Wave Symbol -->
  <g transform="translate(175, 40) scale(0.8)">
    <path d="M0 100 C 50 20, 150 20, 200 100" fill="none" stroke="url(#waveGradient)" stroke-width="15" stroke-linecap="round"/>
    <path d="M20 115 C 60 45, 140 45, 180 115" fill="none" stroke="url(#waveGradient)" stroke-width="15" stroke-linecap="round"/>
    <path d="M40 130 C 70 70, 130 70, 160 130" fill="none" stroke="url(#waveGradient)" stroke-opacity="0.8" stroke-width="15" stroke-linecap="round"/>
    <path d="M60 145 C 80 100, 120 100, 140 145" fill="none" stroke="url(#waveGradient)" stroke-opacity="0.6" stroke-width="15" stroke-linecap="round"/>
  </g>

  <!-- Text -->
  <text x="250" y="190" font-family="serif" font-size="64" fill="#2D463D" text-anchor="middle" font-weight="bold" style="letter-spacing: 10px;">WAYRA</text>
  <text x="250" y="240" font-family="serif" font-size="28" fill="#2D463D" text-anchor="middle" font-style="italic">El viaje que se siente</text>
</svg>
