[build]
  publish = "."
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_OMIT_KEYS = "ADMIN_USER,ADMIN_PASS"

# ── Caché de activos estáticos (imágenes, fuentes, íconos) ──
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Caché de CSS y JS con revalidación corta ──
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# ── Caché de datos JSON (5 min) para las páginas públicas ──
[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=60"

# ── Los datos del admin NUNCA se cachean ──
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store"

# Edge function protege /admin/* a nivel de servidor
[[edge_functions]]
  path = "/admin/*"
  function = "admin-auth"

[[edge_functions]]
  path = "/admin"
  function = "admin-auth"
